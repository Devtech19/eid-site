<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إنشاء عيدية جديدة 🎁</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Tajawal', sans-serif; background: #0a1f14; color: #fefce8; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
  .box { background: rgba(255,255,255,0.05); padding: 40px; border-radius: 20px; border: 1px solid rgba(212,160,23,0.3); text-align: center; max-width: 400px; width: 90%; }
  h1 { color: #f0c040; margin-bottom: 20px; }
  input { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 10px; border: 1px solid #d4a017; background: #0f2d1c; color: #fff; text-align: center; font-family: 'Tajawal'; }
  button { background: linear-gradient(135deg, #d4a017, #f0c040); border: none; padding: 12px 20px; width: 100%; border-radius: 10px; font-weight: bold; font-size: 1.1rem; cursor: pointer; color: #0a1f14; }
  #links { display: none; margin-top: 20px; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 10px; text-align: right; font-size: 0.9rem;}
  .link-box { margin-bottom: 10px; padding: 8px; background: #1a3a28; border-radius: 5px; word-break: break-all; color: #86efac; }
</style>
</head>
<body>

<div class="box">
  <h1>أهلاً بك في منصة العيديات ✨</h1>
  <p>قم بإنشاء غرفتك الخاصة لإدارة عيدية عائلتك</p>
  
  <input type="text" id="adminName" placeholder="اسمك (مثال: عائلة محمد)">
  <input type="password" id="adminPin" placeholder="اختر رقماً سرياً للوحة التحكم (مثال: 1234)">
  <button onclick="createRoom()">إنشاء لوحة التحكم الخاصة بي 🚀</button>

  <div id="links">
    <p>✅ تم الإنشاء بنجاح! احفظ هذه الروابط لديك:</p>
    <strong>🔗 رابط لوحة التحكم (لك فقط):</strong>
    <div class="link-box" id="adminLink"></div>
    <strong>🎮 رابط اللعب (تشاركه مع العائلة):</strong>
    <div class="link-box" id="gameLink"></div>
    <button onclick="goToAdmin()" style="margin-top:10px; background: #34d399;">الدخول للوحة التحكم</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
  // إعدادات مشروعك الخاصة
  const firebaseConfig = {
    apiKey: "AIzaSyBWS4-TuX4igV5xyYrXpPMN5nSL2hkLrIg",
    authDomain: "eidx-e3327.firebaseapp.com",
    databaseURL: "https://eidx-e3327-default-rtdb.firebaseio.com",
    projectId: "eidx-e3327",
    storageBucket: "eidx-e3327.firebasestorage.app",
    messagingSenderId: "745105221043",
    appId: "1:745105221043:web:a032449a0317ca9892d7c6"
  };
  
  firebase.initializeApp(firebaseConfig);
  const database = firebase.database();

  let currentEid = "";

  function generateID() {
    return Math.random().toString(36).substring(2, 8).toUpperCase();
  }

  function createRoom() {
    const name = document.getElementById('adminName').value;
    const pin = document.getElementById('adminPin').value; 
    
    if(!name || !pin) return alert("الرجاء إدخال اسمك واختيار رقم سري");

    currentEid = generateID();
    
    database.ref('eids/' + currentEid + '/info').set({
      adminName: name,
      pin: pin,
      createdAt: new Date().toLocaleString('ar-SA')
    }).then(() => {
      // هذا الجزء كان مفقوداً وهو ضروري لإنشاء الروابط
      const baseUrl = window.location.href.replace('start.html', '');
      document.getElementById('adminLink').innerText = `${baseUrl}admin.html?eid=${currentEid}`;
      document.getElementById('gameLink').innerText = `${baseUrl}index.html?eid=${currentEid}`;
      document.getElementById('links').style.display = 'block';
    }).catch(error => {
      // تصحيح طريقة كتابة الـ catch
      alert("حدث خطأ أثناء الاتصال: " + error);
    });
  }

  function goToAdmin() {
    window.location.href = `admin.html?eid=${currentEid}`;
  }
</script>

</body>
</html>
